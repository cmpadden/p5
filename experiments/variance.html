<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variance Palette · p5 Experiments</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <script>
      document.body.classList.toggle(
        'embed',
        new URLSearchParams(window.location.search).has('embed'),
      );
    </script>
    <header>
      <a class="nav-link" href="../index.html">← All sketches</a>
      <h1>Variance Palette</h1>
      <p>Add gentle RGB perturbations to a fixed palette.</p>
    </header>
    <main>
      <section class="article">
        <div class="sketch-shell">
          <div id="variance-host" class="sketch-host"></div>
        </div>
        <p class="note">
          Hover to view subtle differences. Reload or tap to sample a new set of
          noise values.
        </p>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.1/lib/p5.min.js"></script>
    <script>
      const host = document.getElementById('variance-host');
      const COLORS = [
        '#FFBA08',
        '#FAA307',
        '#F48C06',
        '#E85D04',
        '#DC2F02',
        '#D00000',
        '#9D0208',
        '#6A040F',
        '#370617',
        '#03071E',
      ];

      const sketch = (s) => {
        let width = 400;
        let height = 400;

        const setSize = () => {
          width = host.clientWidth || width;
          height = host.clientHeight || height;
        };

        const hexToRgb = (hex) => {
          const parts = [hex.slice(1, 3), hex.slice(3, 5), hex.slice(5, 7)];
          return parts.map((p) => parseInt(p, 16));
        };

        const addVariance = (rgb, variance) => {
          return rgb.map((channel) => {
            const v = Math.floor(channel + s.random(-variance, variance));
            return Math.min(255, Math.max(0, v));
          });
        };

        s.setup = () => {
          host.textContent = '';
          setSize();
          const canvas = s.createCanvas(width, height);
          canvas.parent(host);
          s.noStroke();
          s.frameRate(3);
        };

        s.draw = () => {
          s.background('#03071E');
          const divisions = 9;
          const size = width / divisions;
          for (let i = 0; i <= divisions; i++) {
            for (let j = 0; j <= divisions; j++) {
              const base = COLORS[(i + j) % COLORS.length];
              const color = addVariance(hexToRgb(base), 15);
              s.fill(color);
              s.square(i * size, j * size, size);
            }
          }
        };

        s.windowResized = () => {
          setSize();
          s.resizeCanvas(width, height);
        };
      };

      new p5(sketch);
    </script>
  </body>
</html>
